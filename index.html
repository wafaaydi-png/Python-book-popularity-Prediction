<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Book Popularity Prediction</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;

    background-image: url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 35px;
    border-radius: 20px;
    background-color: rgba(220,255,220,0.90);
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#0f5132;
    font-size:40px;
}

.subtitle{
    text-align:center;
    color:#2f6b45;
    margin-bottom:30px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.field{
    flex:1;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#0f5132;
    font-size:18px;
}

input, textarea{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

textarea{
    height:100px;
    resize:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#198754;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#146c43;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#d1e7dd;
    border-radius:8px;
    text-align:center;
    font-size:22px;
}
</style>
</head>
<body>

<div class="container">

<h1>📚 Book Popularity Prediction</h1>
<p class="subtitle">Entrez les informations du livre</p>

<form action="/predict" method="POST">

<div class="row">
<div class="field">
<label>Book Title</label>
<input type="text" name="book_title" placeholder="Ex: The Great Book" required>
</div>

<div class="field">
<label>Price</label>
<input type="number" step="0.01" name="price" placeholder="Ex: 25.99" required>
</div>
</div>

<div class="field">
<label>Review Summary</label>
<input type="text" name="review_summary" placeholder="Ex: Very interesting book" required>
</div>

<br>

<div class="field">
<label>Review Text</label>
<textarea name="review_text" placeholder="Write the complete review here..." required></textarea>
</div>

<br>

<div class="field">
<label>Description</label>
<textarea name="description" placeholder="Write the book description here..." required></textarea>
</div>

<br>

<div class="row">
<div class="field">
<label>Helpful Reviews</label>
<input type="number" name="helpful_reviews" placeholder="Ex: 120" required>
</div>

<div class="field">
<label>Total Reviews</label>
<input type="number" name="total_reviews" placeholder="Ex: 350" required>
</div>
</div>

<button type="submit">Prédire</button>

</form>

{% if prediction_text %}
<div class="result">
Résultat : <strong>{{ prediction_text }}</strong>
</div>
{% endif %}

</div>

</body>
</html>
